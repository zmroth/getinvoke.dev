title: Invoke
description: Voice-to-text dictation for developers. Local GPU Whisper transcription, auto-paste, AI prompt reformatter. Windows, Linux, macOS.
url: https://getinvoke.dev
baseurl: ""

# Don't process these as Jekyll
exclude:
  - CNAME
  - INVOKE-PRODUCT-PLAN.md
  - .superpowers

# Permalink style for posts
permalink: /learn/:title/

# Collections (future use)
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
